	<meta charset="UTF-8">

	<link rel="stylesheet" href="styles.css">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">

<body>
	<iframe width="560" height="315" src="https://www.youtube.com/embed/fhmgbLI9CyE?si=uMJeRi-xhdBXjdNM"
		title="YouTube video player" frameborder="0"
		allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
		referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

	<p>
		<span
			class="animate__animated animate__fadeOutUp animate__infinite animate__slower"><strong>Cat:</strong></span>
		"We're
		all mad here. I'm mad. You're mad."
		<br>
		<br>
		"How do you know I'm mad?" said <strong>Alice</strong>.
		<br>
		<br>
		"You must be," said the <span
			class="animate__animated animate__fadeOutDown animate__infinite animate__slower"><strong>Cat</strong></span>,
		"
		or
		you wouldn't have come here."
	</p>
</body>
